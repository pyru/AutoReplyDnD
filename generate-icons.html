<!DOCTYPE html>
<!--
  generate-icons.html
  Open in Chrome → icons download automatically → move them into /icons/ folder.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Busy Bot — Generate Icons</title>
  <style>
    body {
      margin: 0; background: #0d1117; color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 28px;
    }
    h1  { font-size: 22px; margin: 0; }
    p   { margin: 0; color: #8b949e; font-size: 14px; text-align: center; }
    .previews { display: flex; gap: 24px; align-items: flex-end; }
    .box { text-align: center; }
    .box span { display: block; margin-top: 8px; font-size: 12px; color: #8b949e; }
    #status {
      padding: 10px 24px; border-radius: 8px;
      background: #1a3a25; border: 1px solid #2d7a4f;
      color: #3dba72; font-size: 14px; font-weight: 600;
      display: none;
    }
  </style>
</head>
<body>
  <h1>🤖 Busy Bot — Icon Generator</h1>
  <p>Icons generate and download automatically when you open this page.<br>
     Move the 3 downloaded PNG files into the <strong>icons/</strong> folder.</p>

  <div class="previews" id="previews"></div>
  <div id="status"></div>

  <script>
    const SIZES = [16, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Rounded background
      const r = Math.round(size * 0.18);
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.arcTo(size, 0,   size, size, r);
      ctx.arcTo(size, size, 0,   size, r);
      ctx.arcTo(0,   size, 0,   0,    r);
      ctx.arcTo(0,   0,    size, 0,   r);
      ctx.closePath();
      ctx.fillStyle = '#0d1117';
      ctx.fill();

      // Subtle green glow
      const grd = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size * 0.5);
      grd.addColorStop(0, 'rgba(61,186,114,0.22)');
      grd.addColorStop(1, 'rgba(61,186,114,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.fill();

      // Robot emoji
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${Math.round(size * 0.58)}px serif`;
      ctx.fillText('🤖', size / 2, size / 2 + size * 0.02);

      // Green status dot (bottom-right) — only for 48+ px
      if (size >= 48) {
        const dotR = Math.round(size * 0.09);
        const cx   = Math.round(size * 0.80);
        const cy   = Math.round(size * 0.80);
        ctx.beginPath(); ctx.arc(cx, cy, dotR + 1.5, 0, Math.PI*2);
        ctx.fillStyle = '#0d1117'; ctx.fill();
        ctx.beginPath(); ctx.arc(cx, cy, dotR, 0, Math.PI*2);
        ctx.fillStyle = '#3dba72'; ctx.fill();
      }

      return canvas;
    }

    function showPreview(canvas, size) {
      const preview = document.getElementById('previews');
      const display = document.createElement('canvas');
      const show = Math.max(size, 80);
      display.width = display.height = show;
      display.style.cssText = `width:${show}px;height:${show}px;border-radius:10px;`;
      display.getContext('2d').drawImage(canvas, 0, 0, show, show);
      const box = document.createElement('div');
      box.className = 'box';
      box.appendChild(display);
      const lbl = document.createElement('span');
      lbl.textContent = `icon${size}.png`;
      box.appendChild(lbl);
      preview.appendChild(box);
    }

    function downloadCanvas(canvas, filename) {
      return new Promise(resolve => {
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a   = Object.assign(document.createElement('a'), { href: url, download: filename });
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { URL.revokeObjectURL(url); a.remove(); resolve(); }, 200);
        }, 'image/png');
      });
    }

    async function run() {
      const status = document.getElementById('status');
      for (const size of SIZES) {
        const canvas = drawIcon(size);
        showPreview(canvas, size);
        await downloadCanvas(canvas, `icon${size}.png`);
        await new Promise(r => setTimeout(r, 300)); // stagger downloads
      }
      status.style.display = 'block';
      status.textContent   = '✅ 3 icons downloaded! Move them into the icons/ folder, then reload the extension.';
    }

    window.addEventListener('load', run);
  </script>
</body>
</html>
